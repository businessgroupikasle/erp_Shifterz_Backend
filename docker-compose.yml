# version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: shifterz-db
    restart: always
    environment:
      POSTGRES_USER: shifterz
      POSTGRES_PASSWORD: shifterz
      POSTGRES_DB: shifterz
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shifterz-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://shifterz:shifterz@db:5432/shifterz?schema=public
      - PORT=5000
    depends_on:
      - db

volumes:
  postgres_data:
