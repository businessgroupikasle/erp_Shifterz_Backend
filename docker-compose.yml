services:
  db:
    image: postgres:15-alpine
    container_name: shifterz-db
    restart: always
    environment:
      POSTGRES_USER: shifterz
      POSTGRES_PASSWORD: shifterz
      POSTGRES_DB: shifterz
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
